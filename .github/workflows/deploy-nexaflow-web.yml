name: Deploy NexaFlow Web

on:
  push:
    tags:
      - 'nexaflow-web/v*'
    branches:
      - staging
    paths:
      - 'src/NexaFlow/NexaFlow-web/**'
      - '.github/workflows/deploy-nexaflow-web.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'

jobs:

  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.env.outputs.name }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: src/NexaFlow/NexaFlow-web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        working-directory: src/NexaFlow/NexaFlow-web
        env:
          VITE_AUTH_API_URL:    ${{ vars.VITE_AUTH_API_URL }}
          VITE_BOOK_API_URL:    ${{ vars.VITE_BOOK_API_URL }}
          VITE_POS_API_URL:     ${{ vars.VITE_POS_API_URL }}
          VITE_INSIGHT_API_URL: ${{ vars.VITE_INSIGHT_API_URL }}
          VITE_ML_API_URL:      ${{ vars.VITE_ML_API_URL }}
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/NexaFlow/NexaFlow-web/dist
          retention-days: 1

  deploy:
    name: Deploy to ${{ needs.resolve-env.outputs.name }}
    runs-on: ubuntu-latest
    needs: [resolve-env, build]
    environment: ${{ needs.resolve-env.outputs.name }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ secrets.WEB_S3_BUCKET }}
        run: |
          aws s3 sync dist/ s3://${S3_BUCKET} --delete

          # index.html sin cache para que siempre sirva la versión más reciente
          aws s3 cp dist/index.html s3://${S3_BUCKET}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Enable S3 static website hosting (SPA routing)
        env:
          S3_BUCKET: ${{ secrets.WEB_S3_BUCKET }}
        run: |
          aws s3 website s3://${S3_BUCKET} \
            --index-document index.html \
            --error-document index.html
