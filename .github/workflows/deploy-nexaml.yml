name: Deploy NexaML

on:
  push:
    branches:
      - staging
    tags:
      - 'nexaml/v*'
    paths:
      - 'src/NexaML/**'
      - '.github/workflows/deploy-nexaml.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ECR_REPOSITORY: nexaml
  SAM_S3_BUCKET: ${{ secrets.NEXAFLOW_S3_BUCKET }}

jobs:

  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.env.outputs.name }}
      stack: ${{ steps.env.outputs.stack }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
            echo "stack=NexaFlow-NexaML-prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "stack=NexaFlow-NexaML-staging" >> $GITHUB_OUTPUT
          fi

  test:
    name: Run Tests (Python)
    runs-on: ubuntu-latest
    needs: resolve-env
    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/NexaML/requirements*.txt

      - name: Install dev dependencies
        working-directory: src/NexaML
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        working-directory: src/NexaML
        run: pytest tests/unit/ -v --tb=short

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build, tag and push Docker image
        id: image
        working-directory: src/NexaML
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ${{ needs.resolve-env.outputs.name }}
    runs-on: ubuntu-latest
    needs: [resolve-env, build]
    environment: ${{ needs.resolve-env.outputs.name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2.1.0
        with:
          use-installer: true

      - name: SAM Build
        working-directory: src/NexaML
        run: sam build --template template.yaml

      - name: Deploy stack to AWS
        working-directory: src/NexaML
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name ${{ needs.resolve-env.outputs.stack }} \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --s3-prefix NexaML/${{ needs.resolve-env.outputs.name }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --image-repositories NexaMLFunction=${{ needs.build.outputs.image_uri }} \
            --parameter-overrides \
              DbConnection="${{ secrets.NEXAML_DB_CONNECTION }}" \
              BedrockModelId="${{ secrets.NEXAML_BEDROCK_MODEL_ID || 'anthropic.claude-3-haiku-20240307-v1:0' }}" \
              Environment="${{ needs.resolve-env.outputs.name }}"

      - name: Print deployed API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ needs.resolve-env.outputs.stack }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiURL'].OutputValue" \
            --output text
