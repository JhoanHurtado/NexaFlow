name: Deploy NexaML

on:
  push:
    branches:
      - staging
    tags:
      - 'nexaml/v*'
    paths:
      - 'src/NexaML/**'
      - '.github/workflows/deploy-nexaml.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nexaml
  SAM_S3_BUCKET: ${{ secrets.NEXAFLOW_S3_BUCKET }}

jobs:

  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.env.outputs.name }}
      stack: ${{ steps.env.outputs.stack }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
            echo "stack=NexaFlow-NexaML-prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "stack=NexaFlow-NexaML-staging" >> $GITHUB_OUTPUT
          fi

  test:
    name: Run Tests (Python)
    runs-on: ubuntu-latest
    needs: resolve-env
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/NexaML/requirements*.txt

      - name: Install dev dependencies
        working-directory: src/NexaML
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        working-directory: src/NexaML
        run: pytest tests/unit/ -v --tb=short

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [resolve-env, test]
    environment: ${{ needs.resolve-env.outputs.name }}
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Build, tag and push Docker image
        id: image
        working-directory: src/NexaML
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ${{ needs.resolve-env.outputs.name }}
    runs-on: ubuntu-latest
    needs: [resolve-env, build]
    environment: ${{ needs.resolve-env.outputs.name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        working-directory: src/NexaML
        run: sam build --template template.yaml

      - name: Delete stack if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ needs.resolve-env.outputs.stack }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack in ROLLBACK_COMPLETE, deleting..."
            aws cloudformation delete-stack --stack-name ${{ needs.resolve-env.outputs.stack }} --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name ${{ needs.resolve-env.outputs.stack }} --region ${{ env.AWS_REGION }}
            echo "Stack deleted."
          else
            echo "Stack status: $STATUS, no deletion needed."
          fi

      - name: Deploy stack to AWS
        working-directory: src/NexaML
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name ${{ needs.resolve-env.outputs.stack }} \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --s3-prefix NexaML/${{ needs.resolve-env.outputs.name }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DbConnection="${{ secrets.NEXAML_DB_CONNECTION }}" \
              BedrockModelId="${{ secrets.NEXAML_BEDROCK_MODEL_ID || 'anthropic.claude-3-haiku-20240307-v1:0' }}" \
              Environment="${{ needs.resolve-env.outputs.name }}" \
              ImageUri="${{ needs.build.outputs.image_uri }}"

      - name: Show stack failure reason
        if: failure()
        run: |
          if aws cloudformation describe-stacks --stack-name ${{ needs.resolve-env.outputs.stack }} --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            aws cloudformation describe-stack-events \
              --stack-name ${{ needs.resolve-env.outputs.stack }} \
              --region ${{ env.AWS_REGION }} \
              --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId,ResourceStatusReason]' \
              --output table
          else
            echo "Stack ${{ needs.resolve-env.outputs.stack }} does not exist. It may have been deleted during rollback."
          fi

      - name: Print deployed API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ needs.resolve-env.outputs.stack }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiURL'].OutputValue" \
            --output text
