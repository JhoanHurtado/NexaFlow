apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nexaflow
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [nexaflow]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service

      - job_name: 'nexaauth'
        static_configs:
          - targets: ['nexaauth-svc:80']
        metrics_path: /metrics

      - job_name: 'nexapos'
        static_configs:
          - targets: ['nexapos-svc:80']
        metrics_path: /metrics

      - job_name: 'nexabook'
        static_configs:
          - targets: ['nexabook-svc:80']
        metrics_path: /metrics

      - job_name: 'nexainsight'
        static_configs:
          - targets: ['nexainsight-svc:80']
        metrics_path: /metrics

      - job_name: 'nexaml'
        static_configs:
          - targets: ['nexaml-svc:80']
        metrics_path: /metrics
