apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexabook
  namespace: nexaflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexabook
  template:
    metadata:
      labels:
        app: nexabook
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nexabook
          image: nexaflow/nexabook:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: nexaflow-secrets
                  key: DB_CONNECTION
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: nexaflow-config
                  key: ASPNETCORE_URLS
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nexabook-svc
  namespace: nexaflow
spec:
  selector:
    app: nexabook
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30083
