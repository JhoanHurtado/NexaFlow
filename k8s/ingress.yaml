apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexaflow-ingress
  namespace: nexaflow
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexaweb-svc
                port:
                  number: 80
