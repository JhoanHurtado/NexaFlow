apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexapos-hpa
  namespace: nexaflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexapos
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexaauth-hpa
  namespace: nexaflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexaauth
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
