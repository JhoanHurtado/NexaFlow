apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: nexaflow
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexaflow-postgres
  namespace: nexaflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexaflow-postgres
  template:
    metadata:
      labels:
        app: nexaflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: post_usr
            - name: POSTGRES_DB
              value: NexosNexaFlow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexaflow-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "post_usr", "-d", "NexosNexaFlow"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: nexaflow-postgres
  namespace: nexaflow
spec:
  selector:
    app: nexaflow-postgres
  ports:
    - port: 5432
      targetPort: 5432
