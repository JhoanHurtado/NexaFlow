services:
  nexapos-db:
    image: postgres:15-alpine
    container_name: nexapos_postgres
    environment:
      POSTGRES_USER: jhoan_admin
      POSTGRES_PASSWORD: nexapassword123
      POSTGRES_DB: nexapos_db
    ports:
      - "5432:5432"
    volumes:
      - nexapos_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: nexapos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexaflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - nexapos-db

volumes:
  nexapos_data: